<form #registerForm (ngSubmit)="register()">
    <h2 class="text-center text-primary">Sign Up</h2>
    <hr>
    <div class="form-floating mb-3">
        <input class="form-control" type="text" name="username" [(ngModel)]="model.username" placeholder="Username">
        <label>Username</label>
    </div>
    <div class="form-floating mb-3">
        <input class="form-control" type="password" name="password" [(ngModel)]="model.password" placeholder="password">
        <label>Password</label>
    </div>
    <div class="form-group text-center">
        <button class="btn btn-primary me-2" type="submit">Register</button>
        <button (click)="cancel()" class="btn btn-default me-2">cancel</button>
    </div>
</form>
